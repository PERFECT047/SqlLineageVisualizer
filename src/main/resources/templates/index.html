<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>SQL Visualizer</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/svg-pan-zoom@3.6.1/dist/svg-pan-zoom.min.js"></script>

    <style>
        :root {
            --bg: #1a1a1a;
            --panel: #222;
            --border: #3a3a3a;
            --text: #ffffff;
            --primary: #60a5fa;
        }

        body {
            background: var(--bg);
            color: var(--text);
        }

        .card {
            background: var(--panel);
            border: 1px solid var(--border);
        }

        input, select {
            background: #111;
            border: 1px solid var(--border);
            color: white;
        }

        .btn-primary {
            background: var(--primary);
            color: black;
        }

        .btn-disabled {
            background: #555 !important;
            cursor: not-allowed;
            opacity: 0.5;
        }
    </style>
</head>

<body class="min-h-screen flex flex-col items-center p-10">

<h1 class="text-4xl font-bold mb-6 text-blue-400">SQL Visualizer</h1>

<div class="card p-6 rounded w-full max-w-lg">
    <form id="form" class="space-y-4">

        <input id="url" placeholder="jdbc:mysql://localhost:3306/db" class="w-full p-2 rounded">

        <div class="grid grid-cols-2 gap-2">
            <input id="username" placeholder="root" class="p-2 rounded">
            <input id="password" type="password" placeholder="password" class="p-2 rounded">
        </div>

        <select id="engine" class="w-full p-2 rounded">
            <option value="">Select Engine</option>
            <option value="GRAPHVIZ">Graphviz</option>
            <option value="D2">D2</option>
            <option value="MERMAID">Mermaid</option>
            <option value="PLANTUML">PlantUML</option>
        </select>

        <button id="btn" class="btn-primary w-full py-2 rounded" disabled>
            Generate
        </button>

    </form>
</div>

<div class="mt-4 flex gap-2">
    <button id="svgBtn" class="hidden bg-green-500 px-3 py-1 rounded text-black">SVG</button>
    <button id="pngBtn" class="hidden bg-purple-500 px-3 py-1 rounded text-black">PNG</button>
</div>

<div id="diagram" class="mt-6 w-full flex justify-center"></div>

<script>
    const url = document.getElementById("url");
    const user = document.getElementById("username");
    const pass = document.getElementById("password");
    const engine = document.getElementById("engine");
    const btn = document.getElementById("btn");

    const svgBtn = document.getElementById("svgBtn");
    const pngBtn = document.getElementById("pngBtn");

    let currentSVG = "";

    // ✅ validation
    function validate() {
        const valid =
            url.value.trim().length > 0 &&
            user.value.trim().length > 0 &&
            pass.value.trim().length > 0 &&
            engine.value !== "";

        btn.disabled = !valid;
        btn.classList.toggle("btn-disabled", !valid);
    }

    [url, user, pass, engine].forEach(e => e.addEventListener("input", validate));
    validate(); // 🔥 FIX

    // submit
    document.getElementById("form").addEventListener("submit", async (e) => {
        e.preventDefault();

        btn.disabled = true;
        btn.innerText = "Generating...";

        const res = await fetch("/api/visualize", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                url: url.value,
                username: user.value,
                password: pass.value,
                visualizerType: engine.value
            })
        });

        if (!res.ok) {
            alert(await res.text());
            btn.innerText = "Generate";
            validate();
            return;
        }

        currentSVG = await res.text();

        document.getElementById("diagram").innerHTML =
            "<div id='svgWrap' style='width:100%;height:80vh;background:#111'></div>";

        document.getElementById("svgWrap").innerHTML = currentSVG;

        setTimeout(() => {
            const svg = document.querySelector("#svgWrap svg");

            if (svg) {
                svg.style.background = "#ffffff";
            }

            svg.querySelectorAll('path').forEach(p => {
                p.style.stroke = "#333";
            });

            svg.querySelectorAll('text').forEach(t => {
                t.style.fill = "#111";
            });

            svg.style.width = "100%";
            svg.style.height = "100%";

            const panZoom = svgPanZoom(svg, {
                zoomEnabled: true,
                controlIconsEnabled: true
            });

            panZoom.fit();
            panZoom.center();
            panZoom.zoom(1.3);
        }, 100);

        svgBtn.classList.remove("hidden");
        pngBtn.classList.remove("hidden");

        btn.innerText = "Generate";
        validate();
    });

    // SVG download
    svgBtn.onclick = () => {
        const blob = new Blob([currentSVG], { type: "image/svg+xml" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "diagram.svg";
        a.click();
    };

    // PNG download
    pngBtn.onclick = () => {
        const svg = document.querySelector("#svgWrap svg");
        const xml = new XMLSerializer().serializeToString(svg);

        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d");

        const img = new Image();
        const blob = new Blob([xml], { type: "image/svg+xml" });
        const url = URL.createObjectURL(blob);

        img.onload = () => {
            canvas.width = img.width * 2;
            canvas.height = img.height * 2;
            ctx.scale(2, 2);
            ctx.drawImage(img, 0, 0);

            const a = document.createElement("a");
            a.href = canvas.toDataURL("image/png");
            a.download = "diagram.png";
            a.click();

            URL.revokeObjectURL(url);
        };

        img.src = url;
    };
</script>

</body>
</html>
