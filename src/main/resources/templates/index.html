<!DOCTYPE html>

<html>
<head>
    <meta charset="UTF-8">
    <title>Enterprise SQL Visualizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/svg-pan-zoom@3.6.1/dist/svg-pan-zoom.min.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col items-center p-10">

<!-- HEADER -->

<div class="text-center mb-10">
    <h1 class="text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">
        SQL Visualizer
    </h1>
    <p class="text-slate-400 mt-2">Automated Database Schema Mapping</p>
</div>

<!-- FORM -->

<div class="bg-slate-800 p-8 rounded-2xl shadow-2xl w-full max-w-lg border border-slate-700">
    <form id="visualizeForm" class="space-y-5">
        <div>
            <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">
                JDBC Connection String
            </label>
            <input name="url" type="text"
                   placeholder="jdbc:mysql://localhost:3306/db_name"
                   class="w-full p-3 rounded-lg bg-slate-900 border border-slate-700 focus:ring-2 focus:ring-blue-500 outline-none transition">
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Username</label>
                <input name="username" type="text" placeholder="root"
                       class="w-full p-3 rounded-lg bg-slate-900 border border-slate-700 focus:ring-2 focus:ring-blue-500 outline-none transition">
            </div>
            <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Password</label>
                <input name="password" type="password" placeholder="••••••••"
                       class="w-full p-3 rounded-lg bg-slate-900 border border-slate-700 focus:ring-2 focus:ring-blue-500 outline-none transition">
            </div>
        </div>

        <div>
            <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">
                Visualization Engine
            </label>
            <select name="visualizerType"
                    class="w-full p-3 rounded-lg bg-slate-900 border border-slate-700 focus:ring-2 focus:ring-blue-500 outline-none transition">
                <option value="MERMAID">Kroki Mermaid (Modern)</option>
                <option value="PLANTUML">Kroki PlantUML (Enterprise)</option>
                <option value="GRAPHVIZ">Graphviz (Clean Layout)</option>
                <option value="D2">D2 (Modern + Best Looking)</option>
            </select>
        </div>

        <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-500 py-3 rounded-lg font-bold shadow-lg transition-all active:scale-95">
            Generate Diagram
        </button>
    </form>

</div>

<!-- ERROR BOX -->

<div id="errorBox"
     class="hidden mt-6 p-4 bg-red-900/30 border border-red-500 text-red-400 rounded-lg max-w-lg text-center">
</div>

<!-- DIAGRAM OUTPUT -->

<button id="downloadBtn"
        class="hidden mt-6 bg-emerald-600 hover:bg-emerald-500 px-6 py-2 rounded-lg font-semibold">
    Download SVG
</button>

<button id="downloadPngBtn"
        class="hidden mt-3 bg-purple-600 hover:bg-purple-500 px-6 py-2 rounded-lg font-semibold">
    Download PNG
</button>

<div id="diagramContainer"
     class="mt-12 w-full flex flex-col items-center">
</div>

<!-- SCRIPT -->

<script>
    const form = document.getElementById('visualizeForm');
    const diagramContainer = document.getElementById('diagramContainer');
    const errorBox = document.getElementById('errorBox');
    const downloadBtn = document.getElementById('downloadBtn');
    const downloadPngBtn = document.getElementById('downloadPngBtn');

    form.addEventListener('submit', async function(e) {
        e.preventDefault();

        const button = form.querySelector('button');
        button.disabled = true;
        button.innerText = "Generating...";

        errorBox.classList.add('hidden');
        diagramContainer.innerHTML = "";
        downloadBtn.classList.add('hidden');

        try {
            const res = await fetch('/visualize', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    url: form.url.value,
                    username: form.username.value,
                    password: form.password.value,
                    visualizerType: form.visualizerType.value
                })
            });

            if (!res.ok) throw new Error(await res.text());

            const svg = await res.text();

            diagramContainer.innerHTML = `
              <div class="bg-white p-4 rounded-xl shadow-2xl border-8 border-slate-800 max-w-6xl overflow-auto">
                  <div id="svgWrapper">${svg}</div>
              </div>
            `;

            setTimeout(() => {
                const svgEl = document.querySelector('#svgWrapper svg');

                if (svgEl) {
                    svgPanZoom(svgEl, {
                        zoomEnabled: true,
                        controlIconsEnabled: true,
                        fit: true,
                        center: true,
                        minZoom: 0.5,
                        maxZoom: 10
                    });
                }
            }, 100);

            downloadBtn.classList.remove('hidden');

            downloadBtn.onclick = () => {
                const blob = new Blob([svg], { type: "image/svg+xml" });
                const url = URL.createObjectURL(blob);

                const a = document.createElement('a');
                a.href = url;
                a.download = "diagram.svg";
                a.click();

                URL.revokeObjectURL(url);
            };

            downloadPngBtn.classList.remove('hidden');

            downloadPngBtn.onclick = () => {
                const svgEl = document.querySelector('#svgWrapper svg');

                const serializer = new XMLSerializer();
                const svgStr = serializer.serializeToString(svgEl);

                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');

                const img = new Image();

                const blob = new Blob([svgStr], { type: "image/svg+xml;charset=utf-8" });
                const url = URL.createObjectURL(blob);

                img.onload = () => {
                    canvas.width = img.width * 2; // higher resolution
                    canvas.height = img.height * 2;

                    ctx.scale(2, 2);
                    ctx.drawImage(img, 0, 0);

                    const pngUrl = canvas.toDataURL("image/png");

                    const a = document.createElement('a');
                    a.href = pngUrl;
                    a.download = "diagram.png";
                    a.click();

                    URL.revokeObjectURL(url);
                };

                img.src = url;
            };

        } catch (err) {
            errorBox.innerText = err.message;
            errorBox.classList.remove('hidden');
        } finally {
            button.disabled = false;
            button.innerText = "Generate Diagram";
        }
    });
</script>

</body>
</html>
