<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Enterprise SQL Visualizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col items-center p-10">

<div class="text-center mb-10">
    <h1 class="text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">
        SQL Visualizer
    </h1>
    <p class="text-slate-400 mt-2">Automated Database Schema Mapping</p>
</div>

<div class="bg-slate-800 p-8 rounded-2xl shadow-2xl w-full max-w-lg border border-slate-700">
    <form th:action="@{/visualize}" method="post" class="space-y-5">
        <div>
            <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">JDBC Connection String</label>
            <input name="url" type="text" placeholder="jdbc:mysql://localhost:3306/db_name"
                   class="w-full p-3 rounded-lg bg-slate-900 border border-slate-700 focus:ring-2 focus:ring-blue-500 outline-none transition">
        </div>
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Username</label>
                <input name="username" type="text" placeholder="root"
                       class="w-full p-3 rounded-lg bg-slate-900 border border-slate-700 focus:ring-2 focus:ring-blue-500 outline-none transition">
            </div>
            <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Password</label>
                <input name="password" type="password" placeholder="••••••••"
                       class="w-full p-3 rounded-lg bg-slate-900 border border-slate-700 focus:ring-2 focus:ring-blue-500 outline-none transition">
            </div>
        </div>
        <div>
            <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Visualization Engine</label>
            <select name="visualizerType" class="w-full p-3 rounded-lg bg-slate-900 border border-slate-700 focus:ring-2 focus:ring-blue-500 outline-none transition">
                <option value="MERMAID">Kroki Mermaid (Modern)</option>
                <option value="PLANTUML">Kroki PlantUML (Enterprise)</option>
            </select>
        </div>
        <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 py-3 rounded-lg font-bold shadow-lg transition-all active:scale-95">
            Generate Diagram
        </button>
    </form>
</div>

<div th:if="${error}" class="mt-6 p-4 bg-red-900/30 border border-red-500 text-red-400 rounded-lg max-w-lg text-center">
    <p th:text="${error}"></p>
</div>

<div th:if="${success}" class="mt-12 w-full flex flex-col items-center animate-in fade-in duration-700">
    <div class="bg-white p-4 rounded-xl shadow-2xl border-8 border-slate-800 max-w-5xl overflow-auto">
        <img th:src="${imageUrl}" class="max-w-full h-auto" alt="DB Schema">
    </div>
    <a href="/" class="mt-8 text-slate-400 hover:text-white transition underline">Generate another diagram</a>
</div>

</body>
</html>
